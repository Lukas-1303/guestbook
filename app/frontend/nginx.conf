server {
    listen 80;

    # AWS VPC 기본 DNS 리졸버 (VPC 대역 10.0.0.0/16의 +2 주소)
    # WAS 컨테이너가 교체되어 IP가 바뀌어도 Nginx가 10초마다 갱신하도록 설정합니다.
    resolver 10.0.0.2 valid=10s;

    location /api/ {
        set $backend "http://was.local:8080";
        proxy_pass $backend;
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }
}
